name: Build and Release Fritou

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v6
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install Dependencies
        run: flutter pub get

      - name: Build Release APK
        run: flutter build apk --release

      - name: Upload Build Artifacts (Artifacts)
        uses: actions/upload-artifact@v6
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/app-release.apk

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Download Build Artifacts
        uses: actions/download-artifact@v6
        with:
          name: app-release
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/app-release.apk
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download Build Artifacts
        uses: actions/download-artifact@v6
        with:
          name: app-release
          path: artifacts

      - name: 📂 FTP Deploy to OVH
        uses: SamKirkland/FTP-Deploy-Action@4.3.4
        with:
          server: ftp.cluster026.hosting.ovh.net
          username: bthkqiz
          password: Clement2008
          server-dir: download/frite/
          local-dir: artifacts/